services:
  postgres:
    image: postgres:16-alpine
    container_name: member-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: member_os
      POSTGRES_USER: member_os
      POSTGRES_PASSWORD: member_os
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

