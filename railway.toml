[build]
builder = "RAILPACK"
buildCommand = "python manage.py collectstatic --noinput"

[deploy]
preDeployCommand = "/app/.venv/bin/python manage.py migrate --noinput"
startCommand = "sh -c '/app/.venv/bin/gunicorn member_os.wsgi --bind 0.0.0.0:${PORT} --access-logfile - --error-logfile - --log-level info'"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
