version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: member_os
      POSTGRES_PASSWORD: member_os
      POSTGRES_DB: member_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info

  beat:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

volumes:
  postgres_data:
